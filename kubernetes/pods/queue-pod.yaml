apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: queue
  labels:
    app: queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue
      release: "1"
  template:
    metadata:
      labels:
        app: queue
        release: "1"
    spec:
      containers:
      - name: queue
        image: richardchesterwood/k8s-fleetman-queue:release1
        ports:
          - containerPort: 8161
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

---

apiVersion: v1
kind: Service
metadata:
  name: fleetman-queue
spec:
  selector:
    app: queue
    release: "1"
  type: NodePort
  ports:
  - name: fleetman-queue
    port: 8161
    targetPort: 8161
    nodePort: 30010