#       storage: 1Gi

---

apiVersion: v1
kind: Service
metadata:
  name: fleetman-mongodb
spec:
  selector:
    app: mongodb
  type: ClusterIP
  ports:
  - name: mongoport
    port: 27017
    targetPort: 27017
