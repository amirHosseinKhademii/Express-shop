# Shared config for the fleetman microservices lives in `configmap.yaml` (same directory).
# Apply it first — or just `kubectl apply -f kubernetes/pods/` to apply the whole directory at once.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  labels:
    app: webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: richardchesterwood/k8s-fleetman-webapp-angular:release2
        env:
          # Pull the env var from the shared `fleetman-config` ConfigMap (see configmap.yaml) instead of hard-coding.
          - name: SPRING_PROFILES_ACTIVE
            valueFrom:
              configMapKeyRef:
                # Name of the ConfigMap (must exist in the same namespace before this Pod starts).
                name: fleetman-config
                # Key inside the ConfigMap's `data` block to read from.
                key: SPRING_PROFILES_ACTIVE
        ports:
          - containerPort: 80
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: position-simulator
  labels:
    app: position-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: position-simulator
  template:
    metadata:
      labels:
        app: position-simulator
    spec:
      containers:
      - name: position-simulator
        image: richardchesterwood/k8s-fleetman-position-simulator:release2
        env:
          - name: SPRING_PROFILES_ACTIVE
            valueFrom:
              configMapKeyRef:
                name: fleetman-config
                key: SPRING_PROFILES_ACTIVE
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

---

