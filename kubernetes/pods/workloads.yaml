---

# Kubernetes API group/version for this object. "apps/v1" is the stable API for workloads like Deployment.
apiVersion: apps/v1
# The type of object being defined. Deployment manages a replicated, self-healing set of Pods.
kind: Deployment
# Identifying information about this object (name, namespace, labels, annotations).
metadata:
  # Unique name of this Deployment within its namespace. Used by kubectl, Services, etc.
  name: api-gateway
  # Arbitrary key/value tags attached to the Deployment object itself (useful for filtering/selecting).
  labels:
    app: api-gateway
# The desired state: what this Deployment should look like when running.
spec:
  # How many Pod copies to keep running at all times. 2 gives basic HA for the gateway.
  replicas: 2
  # Tells the Deployment which Pods it "owns" — must match the template's labels below.
  selector:
    # Equality-based match: every listed label must be present on the Pod.
    matchLabels:
      app: api-gateway
  # The Pod template — the blueprint used to create each replica.
  template:
    # Metadata applied to every Pod created from this template.
    metadata:
      # These labels MUST include everything in spec.selector.matchLabels, otherwise the Deployment won't adopt its Pods.
      labels:
        app: api-gateway
    # The actual Pod specification (containers, volumes, scheduling hints, etc.).
    spec:
      # List of containers that run inside each Pod. Most Pods have just one "main" container.
      containers:
      # A single container definition. "-" makes this the first (and here, only) item in the list.
      - name: api-gateway
        # Container image + tag pulled from a registry (Docker Hub in this case).
        image: richardchesterwood/k8s-fleetman-api-gateway:release2
        # Ports the container exposes. Informational + used by probes/Services to target the right port.
        ports:
          # The port number the application listens on inside the container.
          - containerPort: 8080
        # Environment variables injected into the container process at startup.
        env:
          # Env var sourced from the shared `fleetman-config` ConfigMap (defined in configmap.yaml).
          # Using valueFrom.configMapKeyRef (instead of a literal `value:`) centralizes config so the
          # Spring profile can be changed in ONE place and picked up by every Deployment on next rollout.
          - name: SPRING_PROFILES_ACTIVE
            # `valueFrom` tells Kubernetes to resolve the value at container-start time from another source.
            valueFrom:
              # Source the value from a key inside a ConfigMap.
              configMapKeyRef:
                # Name of the ConfigMap (must exist in the same namespace as this Pod).
                name: fleetman-config
                # Which key inside that ConfigMap's `data` map to read. Missing key → container fails to start.
                key: SPRING_PROFILES_ACTIVE
          # Cap the JVM heap explicitly so it respects the container's memory limit.
          # This image ships with OpenJDK 8 (pre-8u191), which is NOT cgroup-aware — without -Xmx
          # the JVM sizes the heap from the HOST's RAM (25% of it), ignoring the Pod limit, and
          # gets OOMKilled during startup. -Xmx512m leaves ~500 MiB headroom for non-heap memory
          # (metaspace, code cache, thread stacks, direct buffers, Tomcat native) under the 1 GiB limit.
          - name: JAVA_OPTS
            value: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=192m"
        # CPU/memory guarantees and caps. Critical for scheduling, HPA, and preventing noisy-neighbor issues.
        # Values tuned for a Spring Boot 1.5 + OpenJDK 8 gateway: startup is CPU- AND memory-heavy.
        resources:
          # Minimum resources reserved for this container on its node. Scheduler uses this to place the Pod.
          # HPA percentages (cpu: 70%) are computed against `requests`, not `limits`.
          requests:
            # 250 milli-cores = 0.25 vCPU guaranteed. Gives JVM enough CPU to boot in ~30-45s.
            cpu: "250m"
            # 512 MiB reserved — matches -Xmx plus room for JVM overhead (metaspace, stacks, direct buffers).
            memory: "512Mi"
          # Hard ceiling the container cannot exceed at runtime.
          limits:
            # Allow bursting to 1 full vCPU during boot spikes and traffic peaks. CPU overages throttle, not kill.
            cpu: "1000m"
            # 1 GiB cap. Heap is pinned at 512 MiB via -Xmx, so this leaves ~500 MiB for non-heap
            # (metaspace ~150-200 MiB, code cache ~50 MiB, thread stacks, Tomcat connector buffers, etc.).
            # Went from 768 MiB → 1 GiB because OpenJDK 8 was OOMKilling during Spring startup spike.
            memory: "1Gi"
        # Startup probe: protects slow-starting containers (like JVM/Spring Boot) from being killed
        # by the liveness probe before the app has finished booting. While this probe is running,
        # BOTH readiness and liveness probes are disabled. Once it succeeds once, it is never run
        # again for the life of the container and the normal probes take over.
        #
        # Budget = periodSeconds * failureThreshold = 5 * 30 = 150 seconds to come online.
        # If the app hasn't answered HTTP on "/" within 150s, the container is considered failed
        # and restarted. Tune failureThreshold up if your service is consistently slower.
        startupProbe:
          httpGet:
            path: /
            port: 8080
          # Check every 5s — fast polling during startup, since each check is cheap and we want
          # readiness to flip on as soon as possible after the app is actually up.
          periodSeconds: 5
          # Fail fast per-attempt; if the socket is listening the response is near-instant.
          timeoutSeconds: 3
          # 30 consecutive failures × 5s = 150s total startup budget. Generous headroom for cold JVM starts.
          failureThreshold: 30

        # Readiness probe: tells Kubernetes when this pod is ready to receive traffic.
        # If it fails, the pod is removed from the Service's endpoints (no restart, just no traffic).
        # With a startupProbe present, this probe is suspended until startup succeeds, so we can
        # drop initialDelaySeconds to 0 and rely on startupProbe for the boot-time grace period.
        readinessProbe:
          # Use an HTTP GET request as the health check mechanism (other options: tcpSocket, exec, grpc).
          httpGet:
            # URL path to hit on the container. "/" works, but a dedicated endpoint like
            # "/actuator/health/readiness" is preferred for Spring Boot apps.
            path: /
            # TCP port inside the container to send the request to (matches containerPort above).
            port: 8080
          # Run the probe every 10 seconds.
          periodSeconds: 10
          # Mark this probe attempt as failed if the HTTP response doesn't return within 3 seconds.
          timeoutSeconds: 3
          # Only 1 successful response is needed to flip the pod back to "Ready" after a failure.
          # (For readiness probes, this can be > 1; for liveness it must be 1.)
          successThreshold: 1
          # After 3 consecutive failed probes (~30s), the pod is marked NotReady and taken out of the Service.
          failureThreshold: 3

        # Liveness probe: detects when the container is stuck/deadlocked and needs to be restarted.
        # If it fails past the threshold, Kubernetes kills and restarts the container.
        # Disabled while startupProbe is running, so no initialDelaySeconds needed.
        livenessProbe:
          # Same HTTP GET mechanism. Ideally this points to a different endpoint than readiness
          # (e.g. "/actuator/health/liveness") so "can serve traffic" and "process is alive" are distinct.
          httpGet:
            path: /
            port: 8080
          # Check less frequently than readiness; liveness only needs to catch a truly hung process.
          periodSeconds: 20
          # Slightly more lenient timeout to avoid restarts on brief GC pauses or CPU spikes.
          timeoutSeconds: 5
          # 3 consecutive failures (~60s of sustained trouble) before the container is restarted.
          # Note: successThreshold is intentionally omitted — for liveness it must be 1 (Kubernetes default).
          failureThreshold: 3
